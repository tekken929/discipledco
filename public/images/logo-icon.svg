<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified icon version for favicon/small displays -->
  <rect width="100" height="100" rx="20" fill="#2563eb"/>

  <!-- Open Bible pages -->
  <path d="M 25 35 L 25 70 L 47 67 L 47 32 Z" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <path d="M 53 32 L 53 67 L 75 70 L 75 35 Z" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Bible spine -->
  <rect x="48" y="32" width="4" height="38" fill="#1e40af"/>

  <!-- Cross on left page -->
  <line x1="36" y1="45" x2="36" y2="57" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="51" x2="42" y2="51" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Text lines on right page -->
  <line x1="58" y1="42" x2="68" y2="42" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="48" x2="68" y2="48" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="54" x2="68" y2="54" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="60" x2="65" y2="60" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
</svg>
